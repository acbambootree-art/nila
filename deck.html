    <script type="application/json" id="speaker-notes">
[
  "Welcome. Tonight I want to tell you about Nila — Singapore's first sea-aged wine. The story starts not in a vineyard, but underwater.",
  "Nila is the work of Charlie Phua. He spent two decades on the water before he ever opened a vineyard ledger — and he became convinced that the sea did something to a bottle that no cellar in the world could replicate.",
  "There's a precedent. In 2010, divers off the coast of Åland pulled up champagne from a 19th-century shipwreck — perfectly preserved, more refined than the day it sailed. The sea had been quietly aging it for 170 years. Nila is built on that accident.",
  "We're the first sea-aged wine made in Singapore. Not imported, not imitated — aged in our own waters, in the Strait, off our own coast.",
  "Each bottle takes two journeys. First over land — bottled in Bordeaux, shipped to harbour. Then a second voyage, by hand, into the deep, lowered by a six-person dive crew off Pulau Ubin.",
  "Fifteen metres down. That's the resting depth. Past the wave-line, past the light. Constant pressure of 2.5 atmospheres, constant temperature, no light, only tidal sway.",
  "The bottles stay down for a minimum of six months. Some vintages stay twice as long. They go through phases — settling, colonising, conversation, maturing — before they're hauled, rinsed of brine, and sealed.",
  "Why does this matter? The sea offers four things a cellar can't copy: constant darkness, perpetual gentle agitation from tides, mineral-rich pressure that pushes molecules into tighter conversation, and acoustic silence.",
  "And here's the part I'm proudest of. Each cradle becomes a small reef. Coral, oysters, barnacles colonise the steel — filtering 1,200 litres of water per cradle per day. Forty-two species observed at the site. Zero emissions from cooling — the ocean is our refrigerator.",
  "The inaugural release: four bottles, one ocean. A botanical gin, a white, a red, and a Brut champagne. From $198.",
  "And every single bottle is a one-of-one. We don't paint them. The sea does. After six months at depth, each returns wearing a unique skin of barnacles, coral, and salt-bloom. No two are alike.",
  "Nila's inaugural release is September 2026. Reservations open at nilawines.sg. Thank you."
]
    </script>
